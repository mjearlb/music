<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Milo Bauman Archive</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; }
        #sidebar { width: 320px; border-right: 1px solid #ccc; background: #f6f8fa; display: flex; flex-direction: column; }
        #content-area { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .content-window { flex: 1; border-bottom: 2px solid #eee; padding: 20px; overflow-y: auto; }
        .band-title { cursor: pointer; padding: 5px; color: #0366d6; font-weight: bold; }
        .file-item { cursor: pointer; padding: 5px 15px; color: #555; }
        .file-item:hover { background: #eee; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div style="padding: 20px;">
            <h1>Archive</h1>
            <select id="backup-selector" onchange="switchBackup(this.value)"></select>
        </div>
        <div id="nav-tree"></div>
    </div>

    <div id="content-area">
        <div id="top-window" class="content-window">
            <h2 id="top-title">Setlist Data</h2>
            <div id="top-content">Select a file (Click)</div>
        </div>
        <div id="bottom-window" class="content-window">
            <h2 id="bottom-title">Images</h2>
            <div id="bottom-content">Select a file (Shift + Click)</div>
        </div>
    </div>

    <script>
        let archiveData = {};

        async function init() {
            const res = await fetch('manifest.json');
            archiveData = await res.json();
            const selector = document.getElementById('backup-selector');
            Object.keys(archiveData).sort().reverse().forEach(key => {
                const opt = document.createElement('option');
                opt.value = key; opt.innerText = key;
                selector.appendChild(opt);
            });
            if (Object.keys(archiveData).length > 0) switchBackup(Object.keys(archiveData).sort().reverse()[0]);
        }

        window.switchBackup = (backupKey) => {
            const navTree = document.getElementById('nav-tree');
            navTree.innerHTML = '';
            const bands = archiveData[backupKey];
            for (const [band, files] of Object.entries(bands)) {
                const section = document.createElement('div');
                section.innerHTML = `<div class="band-title">📁 ${band}</div>`;
                const uList = document.createElement('ul');
                files.forEach(file => {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.innerText = file;
                    li.onclick = (e) => loadFile(backupKey, band, file, e.shiftKey ? 'bottom' : 'top');
                    uList.appendChild(li);
                });
                section.appendChild(uList);
                navTree.appendChild(section);
            }
        };

        window.loadFile = async (backup, band, file, target) => {
            const path = (backup === 'Resources') ? `resources/${band}/${file}` : `${backup}/${band}/${file}`;
            document.getElementById(target + '-title').innerText = file;
            const content = document.getElementById(target + '-content');
            
            if (/\.(jpg|jpeg|png|gif)$/i.test(file)) {
                content.innerHTML = `<img src="${path}" style="max-width:100%">`;
            } else {
                const res = await fetch(path);
                content.innerHTML = `<pre>${await res.text()}</pre>`;
            }
        };

        init();
    </script>
</body>
</html>
