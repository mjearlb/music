<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Setlist Archive</title>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; background: #fdfdfd; }
        #nav-bar { padding: 15px; border-bottom: 1px solid #ddd; background: #fff; }
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 320px; border-right: 1px solid #e1e4e8; background: #f6f8fa; display: flex; flex-direction: column; }
        #content-area { flex: 1; padding: 30px; overflow-y: auto; }
        .band-title { font-weight: 600; padding: 10px; cursor: pointer; color: #0366d6; }
        .file-item { padding: 6px 15px; cursor: pointer; color: #586069; }
        .file-item:hover { background: #eaecef; }
        pre { background: #f6f8fa; padding: 20px; border-radius: 6px; border: 1px solid #e1e4e8; }
    </style>
</head>
<body>
    <nav id="nav-bar">
        <a href="index.html" style="font-weight: bold; color: #0366d6;">Setlists</a> | 
        <a href="image_display.html" style="color: #586069;">Image Archive</a>
    </nav>
    <div id="main-container">
        <div id="sidebar">
            <div style="padding: 20px;">
                <select id="backup-selector" onchange="switchBackup(this.value)" style="width:100%"></select>
            </div>
            <div id="nav-tree"></div>
        </div>
        <div id="content-area">
            <h2 id="file-title">Select a file</h2>
            <div id="file-content">Choose a folder to start.</div>
        </div>
    </div>
    <script>
        let archiveData = {};
        async function init() {
            const res = await fetch('manifest.json');
            archiveData = await res.json();
            const selector = document.getElementById('backup-selector');
            const backups = Object.keys(archiveData).filter(k => k.startsWith('Backup')).sort().reverse();
            backups.forEach(key => {
                const opt = document.createElement('option');
                opt.value = key; opt.innerText = key.replace(/_/g, ' ');
                selector.appendChild(opt);
            });
            if (backups.length > 0) switchBackup(backups[0]);
        }
        window.switchBackup = (backupKey) => {
            const navTree = document.getElementById('nav-tree');
            navTree.innerHTML = '';
            const bands = archiveData[backupKey];
            for (const [band, files] of Object.entries(bands)) {
                const section = document.createElement('div');
                section.innerHTML = `<div class="band-title">📁 ${band}</div>`;
                const uList = document.createElement('ul');
                uList.style.listStyle = 'none'; uList.padding = 0;
                files.forEach(file => {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.innerText = file;
                    li.onclick = async () => {
                        document.getElementById('file-title').innerText = file;
                        const res = await fetch(`${backupKey}/${band}/${file}`);
                        document.getElementById('file-content').innerHTML = `<pre>${await res.text()}</pre>`;
                    };
                    uList.appendChild(li);
                });
                section.appendChild(uList);
                navTree.appendChild(section);
            }
        };
        init();
    </script>
</body>
</html>
