<style>
    /* Add this to your style block */
    #content-area { display: flex; flex-direction: column; }
    .content-window { flex: 1; border-bottom: 2px solid #ccc; overflow-y: auto; padding: 20px; }
</style>

<body>
    <div id="content-area">
        <div id="top-window" class="content-window">
            <h2 id="top-title">Top Window</h2>
            <div id="top-content">Select a file...</div>
        </div>
        <div id="bottom-window" class="content-window">
            <h2 id="bottom-title">Bottom Window</h2>
            <div id="bottom-content">Select a file...</div>
        </div>
    </div>

    <script>
        // Update the file list click to offer a choice
        // Inside your files.forEach loop:
        li.onclick = (e) => {
            const target = e.shiftKey ? 'bottom' : 'top'; // Hold SHIFT to open in bottom
            loadFile(backupKey, band, file, target);
        };

        async function loadFile(backup, band, file, target) {
            // Determine Path
            const path = (backup === 'Resources') 
                ? `resources/${band}/${file}` 
                : `${backup}/${band}/${file}`;
            
            document.getElementById(target + '-title').innerText = file;
            const contentArea = document.getElementById(target + '-content');

            if (/\.(jpg|jpeg|png)$/i.test(file)) {
                contentArea.innerHTML = `<img src="${path}" style="max-width:100%">`;
            } else {
                const res = await fetch(path);
                const text = await res.text();
                contentArea.innerHTML = `<pre>${text}</pre>`;
            }
        }
    </script>
</body>
