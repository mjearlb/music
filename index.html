<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Setlist Archive</title>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; background: #fdfdfd; }
        #nav-bar { padding: 15px; border-bottom: 1px solid #ddd; background: #fff; }
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 320px; border-right: 1px solid #e1e4e8; background: #f6f8fa; display: flex; flex-direction: column; overflow-y: auto; }
        #content-area { flex: 1; padding: 30px; overflow-y: auto; }
        .band-title { font-weight: 600; padding: 10px; cursor: pointer; color: #0366d6; }
        .file-item { padding: 6px 15px; cursor: pointer; color: #586069; }
        .file-item:hover { background: #eaecef; }
        .file-list { display: none; list-style: none; padding: 0; margin: 0; }
        pre { background: #f6f8fa; padding: 20px; border-radius: 6px; border: 1px solid #e1e4e8; }
    </style>
</head>
<body>
    <nav id="nav-bar">
        <a href="index.html" style="font-weight: bold; color: #0366d6;">Setlists</a> | 
        <a href="image_display.html" style="color: #586069;">Image Archive</a>
    </nav>
    <div id="main-container">
        <div id="sidebar">
            <div id="nav-tree"></div>
        </div>
        <div id="content-area">
            <h2 id="file-title">Select a file</h2>
            <div id="file-content">Choose a folder to start.</div>
        </div>
    </div>
    <script>
        async function init() {
            const res = await fetch('manifest.json');
            const data = await res.json();
            const setlists = data['Setlists'] || {};
            const navTree = document.getElementById('nav-tree');

            // 1. Render Root Files first
            if (setlists['_root_']) {
                setlists['_root_'].forEach(file => {
                    const div = document.createElement('div');
                    div.className = 'file-item';
                    div.innerText = `📄 ${file}`;
                    div.onclick = () => loadFile('Setlists', file, file);
                    navTree.appendChild(div);
                });
            }

            // 2. Render Band Folders
            for (const [band, files] of Object.entries(setlists)) {
                if (band === '_root_') continue;
                const section = document.createElement('div');
                const header = document.createElement('div');
                header.className = 'band-title';
                header.innerText = `📁 ${band}`;
                const uList = document.createElement('ul');
                uList.className = 'file-list';
                header.onclick = () => uList.style.display = uList.style.display === 'block' ? 'none' : 'block';
                
                files.forEach(file => {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.innerText = file;
                    li.onclick = () => loadFile(`Setlists/${band}`, file, file);
                    uList.appendChild(li);
                });
                section.appendChild(header);
                section.appendChild(uList);
                navTree.appendChild(section);
            }
        }

        async function loadFile(path, filename, displayTitle) {
            document.getElementById('file-title').innerText = displayTitle;
            const res = await fetch(`${path}/${filename}`);
            document.getElementById('file-content').innerHTML = `<pre>${await res.text()}</pre>`;
        }
        init();
    </script>
</body>
</html>
